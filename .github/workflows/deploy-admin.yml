name: Deploy Admin (Vercel)

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - 'packages/shared/**'
      - 'packages/types/**'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: deploy-admin-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'

jobs:
  deploy:
    name: Build & Deploy → Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Déployer sur Vercel
        # La CLI doit tourner depuis la racine pour uploader le monorepo complet.
        # Vercel utilise le Root Directory du projet (apps/admin) configuré via vercel link.
        # vercel.json dans apps/admin remonte à la racine pour npm ci et le build workspace.
        run: npx vercel@latest --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

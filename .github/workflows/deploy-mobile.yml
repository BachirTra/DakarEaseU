name: Deploy Mobile (EAS)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production

concurrency:
  group: deploy-mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Configurer Expo / EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Déterminer le profil EAS
        id: profile
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "profile=production" >> $GITHUB_OUTPUT
          else
            echo "profile=${{ github.event.inputs.profile }}" >> $GITHUB_OUTPUT
          fi

      - name: Build EAS (${{ steps.profile.outputs.profile }})
        working-directory: ./apps/mobile
        run: eas build --platform all --profile ${{ steps.profile.outputs.profile }} --non-interactive --no-wait
